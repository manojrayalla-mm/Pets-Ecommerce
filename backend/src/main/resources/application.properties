# ===================================
# Pet Kingdom Application Configuration
# ===================================

# Server Configuration
# Railway injects the PORT env variable — fall back to 8080 locally
server.port=${PORT:8080}

# Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:pet_kingdom;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
petkingdom.app.jwtSecret=SuperSecretKeyForPetKingdomEcommerceAppMakeSureItIsLongEnoughToBeSecure
petkingdom.app.jwtExpirationMs=86400000

# Application Name
spring.application.name=pet-kingdom

# Razorpay Configuration (Replace with your actual keys from https://dashboard.razorpay.com/)
razorpay.key.id=rzp_test_YourTestKeyIdHere
razorpay.key.secret=YourTestKeySecretHere

# Logging Configuration
logging.level.com.petkingdom=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# CORS Configuration (for React frontend)
# Note: CORS is configured in WebConfig.java

